<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>Lumière | Modern E-Commerce</title>
  </head>
  <body>
    <!-- Navbar -->
    <header class="header">
      <a href="/" class="logo">Lumière</a>
      <nav class="nav">
        <a href="#home">Home</a>
        <a href="#collections">Collections</a>
        <a href="/login.html">Sign In</a>
      </nav>
      <div class="header-actions">
        <button class="icon-btn" id="theme-toggle" title="Toggle Light/Dark Theme">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="theme-icon"></svg>
        </button>
        <button class="icon-btn" id="cart-btn">
          Cart (<span id="cart-count">0</span>)
        </button>
      </div>
    </header>

    <main>
      <!-- Hero Section -->
      <section class="hero reveal" id="home">
        <div class="hero-bg"></div>
        <div class="hero-overlay"></div>
        <div class="hero-content">
          <h1>Effortless Elegance.</h1>
          <p>Discover our curated collection of luxury apparel, premium bags, and modern footwear.</p>
          <button class="btn-primary" onclick="document.getElementById('collections').scrollIntoView({behavior: 'smooth'})">Shop Collection</button>
        </div>
      </section>

      <!-- Category Filter -->
      <section class="categories reveal" id="collections">
        <button class="category-btn active" data-category="all">All</button>
        <button class="category-btn" data-category="clothes">Clothes</button>
        <button class="category-btn" data-category="bags">Bags</button>
        <button class="category-btn" data-category="shoes">Shoes</button>
      </section>

      <!-- Products Grid -->
      <section class="products-section reveal">
        <div class="products-grid" id="products-grid">
           <!-- Dynamic Content from JS -->
        </div>
      </section>
    </main>

    <footer class="footer reveal">
      <div class="footer-logo">Lumière</div>
      <p>&copy; 2026 Lumière E-Commerce. Developed for Elegance.</p>
    </footer>

    <!-- Checkout Modal / Sidebar -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
      <div class="cart-header">
        <h2 id="checkout-title">Your Cart</h2>
        <button id="close-cart">&times;</button>
      </div>
      <div class="cart-body">
        
        <!-- Step 1: Cart Items -->
        <div class="checkout-step active" id="step-1">
          <div class="cart-items" id="cart-items">
            <!-- Dynamic items -->
          </div>
          <div class="cart-footer">
            <div class="cart-total"><span>Total:</span> $<span id="cart-total-price">0.00</span></div>
            <button class="btn-primary checkout-btn" id="go-to-shipping">Proceed to Checkout</button>
          </div>
        </div>

        <!-- Step 2: Shipping Info -->
        <div class="checkout-step" id="step-2">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Jane Doe" required>
          </div>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="jane@example.com" required>
          </div>
          <div class="form-group">
            <label>Shipping Address</label>
            <input type="text" placeholder="123 Luxury Ave, NY" required>
          </div>
          <div class="cart-footer">
            <button class="btn-primary checkout-btn" id="go-to-payment" style="margin-bottom: 10px;">Continue to Payment</button>
            <button class="btn-primary checkout-btn" style="background:transparent; color:var(--text-main); border:1px solid var(--border);" id="back-to-cart">Back to Cart</button>
          </div>
        </div>

        <!-- Step 3: Payment Info -->
        <div class="checkout-step" id="step-3">
          <div class="form-group">
            <label>Cardholder Name</label>
            <input type="text" placeholder="Jane Doe" required>
          </div>
          <div class="form-group">
            <label>Card Number</label>
            <input type="text" placeholder="0000 0000 0000 0000" required>
          </div>
          <div class="flex-row">
            <div class="form-group">
              <label>Expiry Date</label>
              <input type="text" placeholder="MM/YY" required>
            </div>
            <div class="form-group">
              <label>CVC</label>
              <input type="password" placeholder="123" required>
            </div>
          </div>
          <div class="cart-footer">
            <button class="btn-primary checkout-btn" id="confirm-order" style="margin-bottom: 10px;">Place Order</button>
            <button class="btn-primary checkout-btn" style="background:transparent; color:var(--text-main); border:1px solid var(--border);" id="back-to-shipping">Back to Shipping</button>
          </div>
        </div>

        <!-- Step 4: Success -->
        <div class="checkout-step" id="step-4">
          <div class="success-icon">✓</div>
          <div class="success-msg">Order Confirmed!</div>
          <div class="success-sub">Thank you for your elegant choice.</div>
          <button class="btn-primary checkout-btn" id="close-success">Continue Shopping</button>
        </div>

      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/src/style.css">
  </body>
</html>
